[options]
addons_path = /mnt/extra-addons,/mnt/oca-addons,/usr/lib/python3/dist-packages/odoo/addons
admin_passwd = admin_master_password_cambiar
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

; --- Desarrollo ---
; Activa el modo debug automáticamente al acceder
; Usa ?debug=1 en la URL o cambia a True aquí
dev_mode = False

; Logging (útil para aprender qué hace Odoo internamente)
log_level = info
; log_level = debug   ← descomenta si quieres ver TODO (muy verboso)

; Performance (valores bajos para dev, subir en producción)
workers = 0           ; 0 = modo thread único, ideal para debugging con pdb
max_cron_threads = 1
